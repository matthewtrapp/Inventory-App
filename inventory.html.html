<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Barcode Inventory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://unpkg.com/@zxing/browser@latest"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; padding: 16px; max-width: 720px; margin: auto; background:#f7f7f7; }
    h1, h2 { margin-bottom: 8px; }
    .card { background:#fff; border-radius:12px; padding:14px; margin:12px 0; box-shadow:0 1px 4px rgba(0,0,0,.12); }
    video { width: 100%; border: 1px solid #ccc; border-radius: 10px; background:#000; }
    input, button { box-sizing:border-box; padding: 12px; margin: 6px 0; width: 100%; font-size: 16px; border-radius:8px; border:1px solid #bbb; }
    button { background:#0a84ff; color:#fff; border:none; font-weight:600; }
    button.secondary { background:#666; }
    button.danger { background:#c62828; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; background:#fff; }
    th, td { border-bottom: 1px solid #ddd; padding: 8px; text-align: left; font-size:14px; }
    .status { font-size: 14px; color:#444; min-height:20px; }
  </style>
</head>
<body>
  <h1>Barcode Inventory</h1>
  <p>Scan barcodes with your phone camera and save item quantities.</p>

  <div class="card">
    <h2>Scanner</h2>
    <video id="video" playsinline></video>
    <p id="status" class="status">Scanner is stopped.</p>
    <button onclick="startScanner()">Start Scanner</button>
    <button class="secondary" onclick="stopScanner()">Stop Scanner</button>
  </div>

  <div class="card">
    <h2>Item</h2>
    <input id="barcode" placeholder="Barcode" />
    <input id="name" placeholder="Item name" />
    <input id="quantity" type="number" placeholder="Quantity" value="1" />
    <button onclick="saveItem()">Save / Update Item</button>
  </div>

  <div class="card">
    <h2>Inventory</h2>
    <button onclick="exportCSV()">Export CSV</button>
    <input type="file" accept=".csv" onchange="importCSV(event)" />
    <table>
      <thead><tr><th>Barcode</th><th>Name</th><th>Qty</th><th></th></tr></thead>
      <tbody id="inventory"></tbody>
    </table>
  </div>

<script>
let inventory = JSON.parse(localStorage.getItem("inventory")) || {};
let codeReader = null;
let controls = null;
let lastScan = "";
let lastScanTime = 0;

function setStatus(message) { document.getElementById("status").textContent = message; }

function escapeHTML(text) {
  return String(text).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
}

function renderInventory() {
  const tbody = document.getElementById("inventory");
  tbody.innerHTML = "";
  Object.entries(inventory).forEach(([barcode, item]) => {
    const row = document.createElement("tr");
    row.innerHTML = `<td>${escapeHTML(barcode)}</td><td>${escapeHTML(item.name)}</td><td>${item.quantity}</td><td><button class="danger" onclick="deleteItem('${escapeHTML(barcode)}')">Delete</button></td>`;
    tbody.appendChild(row);
  });
  localStorage.setItem("inventory", JSON.stringify(inventory));
}

async function startScanner() {
  try {
    stopScanner();
    codeReader = new ZXingBrowser.BrowserMultiFormatReader();
    controls = await codeReader.decodeFromVideoDevice(undefined, "video", (result, error) => {
      if (result) {
        const now = Date.now();
        const code = result.getText();
        if (code === lastScan && now - lastScanTime < 1500) return;
        lastScan = code;
        lastScanTime = now;
        document.getElementById("barcode").value = code;
        if (inventory[code]) {
          document.getElementById("name").value = inventory[code].name;
          document.getElementById("quantity").value = inventory[code].quantity + 1;
          setStatus("Scanned existing item. Quantity increased by 1 in the form. Tap Save / Update Item.");
        } else {
          document.getElementById("name").value = "";
          document.getElementById("quantity").value = 1;
          setStatus("Scanned new barcode. Enter the item name, then tap Save / Update Item.");
        }
      }
    });
    setStatus("Scanner started. Allow camera access if asked.");
  } catch (err) {
    setStatus("Camera failed to start. Make sure this page is opened with HTTPS and camera permission is allowed.");
    alert(err.message || err);
  }
}

function stopScanner() {
  if (controls) { controls.stop(); controls = null; }
  setStatus("Scanner is stopped.");
}

function saveItem() {
  const barcode = document.getElementById("barcode").value.trim();
  const name = document.getElementById("name").value.trim();
  const quantity = parseInt(document.getElementById("quantity").value, 10);
  if (!barcode || !name || isNaN(quantity)) { alert("Please enter barcode, name, and quantity."); return; }
  inventory[barcode] = { name, quantity };
  renderInventory();
  document.getElementById("barcode").value = "";
  document.getElementById("name").value = "";
  document.getElementById("quantity").value = 1;
  setStatus("Item saved.");
}

function deleteItem(barcode) { delete inventory[barcode]; renderInventory(); }

function exportCSV() {
  let csv = "barcode,name,quantity\n";
  Object.entries(inventory).forEach(([barcode, item]) => {
    csv += `"${String(barcode).replaceAll('"','""')}","${String(item.name).replaceAll('"','""')}",${item.quantity}\n`;
  });
  const blob = new Blob([csv], { type: "text/csv" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "inventory.csv";
  link.click();
}

function parseCSVLine(line) {
  const values = [];
  let current = "", inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    if (char === '"' && line[i + 1] === '"') { current += '"'; i++; }
    else if (char === '"') { inQuotes = !inQuotes; }
    else if (char === ',' && !inQuotes) { values.push(current); current = ""; }
    else { current += char; }
  }
  values.push(current);
  return values;
}

function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const rows = e.target.result.split(/\r?\n/).slice(1);
    rows.forEach(row => {
      if (!row.trim()) return;
      const [barcode, name, quantity] = parseCSVLine(row);
      if (barcode && name && quantity) inventory[barcode.trim()] = { name: name.trim(), quantity: parseInt(quantity, 10) };
    });
    renderInventory();
    setStatus("CSV imported.");
  };
  reader.readAsText(file);
}

renderInventory();
</script>
</body>
</html>
